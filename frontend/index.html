<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather Bauhaus</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">Weather Bauhaus</div>
            <div class="brand-sub">Grid, Poster, Clock</div>
          </div>
        </div>

        <div class="controls">
          <input id="cityInput" type="text" placeholder="Enter city" />
          <button id="searchBtn">Fetch</button>
          <button id="geoBtn">Use my location</button>
          <div class="unit-toggle">
            <button data-units="metric" class="unit-btn active">C</button>
            <button data-units="imperial" class="unit-btn">F</button>
          </div>
        </div>
        <div id="statusMsg" class="status-msg"></div>
      </header>

      <section class="top-row">
        <section class="poster-panel">
          <div class="poster-left">
            <div id="posterCity" class="poster-city">City</div>
            <div id="posterTemp" class="poster-temp">--</div>
            <div id="posterDesc" class="poster-desc">---</div>
          </div>
          <div class="poster-right">
            <div id="weatherStage" class="weather-stage">
              <div class="sun">
                <div class="sun-rays"></div>
              </div>
              <div class="cloud cloud--1"></div>
              <div class="cloud cloud--2"></div>
              <div class="rain"></div>
              <div class="snow"></div>
              <div class="stars"></div>
            </div>
          </div>
        </section>

        <section class="activity-panel">
          <div class="activity-title">Activity Suggestions</div>
          <div id="activitySummary" class="activity-summary">Loading suggestions...</div>
          <div id="activityList" class="activity-list"></div>
        </section>
      </section>

      <section class="grid-panel">
        <div class="metric-card" id="tempCard"></div>
        <div class="metric-card" id="feelsCard"></div>
        <div class="metric-card" id="windCard"></div>
        <div class="metric-card" id="humidityCard"></div>
        <div class="metric-card" id="pressureCard"></div>
        <div class="metric-card" id="cloudsCard"></div>
        <div class="metric-card" id="visibilityCard"></div>
        <div class="metric-card" id="sunriseCard"></div>
        <div class="metric-card" id="sunsetCard"></div>
        <div class="metric-card" id="precipCard"></div>
        <div class="metric-card" id="aqiCard"></div>
        <div class="metric-card" id="uvCard"></div>
      </section>

      <section class="forecast-row">
        <section class="forecast-panel">
          <div class="forecast-title">Next 24h</div>
          <div id="forecastStrip" class="forecast-strip"></div>
        </section>

        <section class="climate-panel">
          <div class="forecast-title">5-Day Climate</div>
          <div id="climateStrip" class="climate-strip"></div>
        </section>
      </section>

      <section class="bottom-row">
        <section class="alerts-panel">
          <div class="forecast-title">Alerts</div>
          <div id="alertsList" class="alerts-list"></div>
        </section>

        <section class="world-panel">
          <div class="map-wrap">
            <div class="panel-title">World Map</div>
            <div id="worldMap" class="world-map"></div>
          </div>
          <div class="world-side">
            <div class="panel-title">Region Watch</div>
            <div class="region-controls">
              <select id="regionSelect">
                <option value="global">Global</option>
                <option value="north_america">North America</option>
                <option value="south_america">South America</option>
                <option value="europe">Europe</option>
                <option value="africa">Africa</option>
                <option value="asia">Asia</option>
                <option value="oceania">Oceania</option>
              </select>
              <button id="regionLoadBtn">Load</button>
            </div>
            <div id="regionSummary" class="region-summary"></div>
            <div id="regionGrid" class="region-grid"></div>
          </div>
        </section>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
